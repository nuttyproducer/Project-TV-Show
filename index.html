<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Benjamin Vanderzeypen (Nuttyproducer)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <!-- Splash intro video overlay -->
    <div id="splash-overlay">
      <video
        id="splash-video"
        src="assets/splash-screen/splash-intro.mp4"
        autoplay
        muted
        playsinline
      ></video>
    </div>

    <div id="main-content">
      <header class="banner">
        <nav class="nav">
          <img
            class="nav-logo"
            src="assets/images/benflix-logo-square.png"
            alt="Benflix logo"
          />
          <div class="nav-controls">
            <div class="select-wrapper">
              <label for="show-selector" class="visually-hidden"
                >Select a TV show</label
              >
              <select id="show-selector">
                <option value="">Loading shows...</option>
              </select>
            </div>

            <div class="select-wrapper">
              <label for="episode-selector" class="visually-hidden"
                >Select an episode</label
              >
              <select id="episode-selector">
                <option value="all">All Episodes</option>
              </select>
            </div>

            <label for="search-input" class="visually-hidden"
              >Search episodes</label
            >
            <input
              type="text"
              id="search-input"
              placeholder="Search episodes..."
            />
            <span id="search-count"></span>
          </div>
        </nav>
        <div class="banner-contents">
          <p class="hero-series-label">
            <img
              class="hero-series-logo"
              src="assets/images/benflix-logo-square.png"
              alt="Benflix"
            />
            SERIES
          </p>
          <!-- Title and summary are filled in dynamically by script.js -->
          <h1 class="hero-title"></h1>
          <p class="hero-summary"></p>
        </div>
      </header>

      <section id="episode-list">
        <div id="episode-cards"></div>
      </section>

      <footer>
        <p>
          Data originally sourced from
          <a href="https://tvmaze.com/" target="_blank">TVMaze.com</a>
        </p>
        <p>
          This is a fan-made student project. Not affiliated with or endorsed by
          Netflix, Inc. All trademarks belong to their respective owners.
        </p>
      </footer>
    </div>
    <!-- end #main-content -->

    <!-- Loads YOUR javascript code -->
    <script src="script.js"></script>

    <script src="splash.js"></script>
  </body>
</html>
