<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Benjamin Vanderzeypen (Nuttyproducer)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <!-- Splash intro video overlay -->
    <div id="splash-overlay">
      <video
        id="splash-video"
        src="assets/splash-screen/splash-intro.mp4"
        autoplay
        muted
        playsinline
      ></video>
    </div>

    <div id="main-content">
      <!-- ─── SHOWS VIEW ─────────────────────────────────────────────── -->
      <main id="shows-view" class="view">
        <section class="hero" id="hero">
          <div class="hero-bg" id="hero-bg"></div>
          <div class="hero-scrim"></div>

          <nav class="top-nav">
            <img
              class="nav-logo"
              src="assets/images/benflix-show-logo-full.png"
              alt="Benflix"
            />
          </nav>

          <div class="hero-contents" id="hero-contents">
            <p class="hero-series-label">
              <img
                class="hero-series-logo"
                src="assets/images/benflix-logo-square.png"
                alt="Benflix"
              />
              SERIES
            </p>
            <h1 class="hero-title" id="hero-title">Loading...</h1>
            <p class="hero-summary" id="hero-summary"></p>
          </div>
        </section>

        <nav class="page-nav shows-nav">
          <div class="page-nav-left"></div>
          <div class="page-nav-right">
            <select id="shows-sort" class="nav-select">
              <option value="alpha">Sort: A–Z</option>
              <option value="rating">Sort: Highest rated</option>
            </select>
            <input
              type="search"
              id="shows-search"
              class="nav-input"
              placeholder="Search shows by name, genre, or summary..."
            />
          </div>
        </nav>

        <section id="genre-rows" class="genre-rows"></section>

        <section id="shows-flat" class="shows-flat hidden">
          <div id="shows-grid"></div>
        </section>
      </main>

      <!-- ─── EPISODES VIEW ─────────────────────────────────────────── -->
      <main id="episodes-view" class="view hidden">
        <nav class="page-nav episodes-nav">
          <div class="page-nav-left">
            <button type="button" id="back-to-shows" class="nav-button">
              ← Back to shows
            </button>
          </div>
        </nav>

        <header class="episodes-header" id="episodes-header">
          <div class="episodes-header-top">
            <h2 id="episodes-show-title"></h2>
            <select id="episodes-season-select" class="nav-select">
              <option value="all">All Seasons</option>
            </select>
            <select id="episode-selector" class="nav-select">
              <option value="all">Jump to episode...</option>
            </select>
            <input
              type="search"
              id="search-input"
              class="nav-input"
              placeholder="Search episode title or summary..."
            />
            <span id="search-count" class="nav-count"></span>
          </div>
        </header>

        <section id="episode-list">
          <div id="episode-cards"></div>
          <div id="episodes-load-more-box" class="episodes-load-more-box hidden">
            <button id="episodes-load-more-btn" class="nav-button">Load More Episodes</button>
          </div>
        </section>
      </main>

      <footer>
        <p>
          Data originally sourced from
          <a href="https://tvmaze.com/" target="_blank">TVMaze.com</a>
        </p>
        <p>
          This is a fan-made student project. Not affiliated with or endorsed by
          Netflix, Inc. All trademarks belong to their respective owners.
        </p>
      </footer>
    </div>
    <!-- end #main-content -->

    <!-- API keys and config — git-ignored, never committed -->
    <script src="config.js"></script>
    <!-- Loads YOUR javascript code -->
    <script src="script.js"></script>

    <script src="splash.js"></script>
  </body>
</html>
